name: Test Node application
on:
  workflow_call:
    inputs:
      working-directory:
        type: string
        required: true

jobs:
  build:
    name: Build ${{ inputs.working-directory }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          scope: '@navikt'
          cache: 'npm'
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

      - name: Install node.js dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: npm run build
        env:
          ENONIC_API: https://idebanken-xp7test.enonic.cloud/headless/ # needed for SSG

      - name: Run unit tests
        run: npm run test
